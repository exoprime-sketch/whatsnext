name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  pwa-build:
    name: PWA Build
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run ci:web

      - name: Release readiness report
        run: npm run check:release

      - name: Upload web build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pwa-dist
          path: dist
          if-no-files-found: warn

  ios-simulator-build:
    name: iOS Simulator Build
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Release readiness report
        run: npm run check:release

      - name: Build iOS simulator target
        run: bash scripts/ci/build-ios-simulator.sh

      - name: Upload iOS build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: .artifacts/ios
          if-no-files-found: warn
