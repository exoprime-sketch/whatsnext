name: iOS TestFlight

# Manual-only trigger. Never runs on push or PR.
# Requires all signing secrets to be configured before use.
on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'What changed in this build (shown in TestFlight)'
        required: false
        default: 'Internal test build'

jobs:
  preflight:
    name: Check required secrets
    runs-on: ubuntu-latest
    steps:
      - name: Verify secrets are set
        run: |
          MISSING=""
          [ -z "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}"       ] && MISSING="$MISSING APP_STORE_CONNECT_API_KEY_ID"
          [ -z "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"    ] && MISSING="$MISSING APP_STORE_CONNECT_API_ISSUER_ID"
          [ -z "${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}"  ] && MISSING="$MISSING APP_STORE_CONNECT_API_PRIVATE_KEY"
          [ -z "${{ secrets.APPLE_TEAM_ID }}"                      ] && MISSING="$MISSING APPLE_TEAM_ID"
          [ -z "${{ secrets.IOS_BUNDLE_ID }}"                      ] && MISSING="$MISSING IOS_BUNDLE_ID"
          [ -z "${{ secrets.SIGNING_CERTIFICATE_BASE64 }}"         ] && MISSING="$MISSING SIGNING_CERTIFICATE_BASE64"
          [ -z "${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}"       ] && MISSING="$MISSING SIGNING_CERTIFICATE_PASSWORD"
          [ -z "${{ secrets.PROVISIONING_PROFILE_BASE64 }}"        ] && MISSING="$MISSING PROVISIONING_PROFILE_BASE64"
          if [ -n "$MISSING" ]; then
            echo "ERROR: The following required GitHub secrets are not set:$MISSING"
            echo ""
            echo "Configure them at: Settings → Secrets and variables → Actions"
            echo "See ios/WhatsNext/NO_MAC_TESTFLIGHT_PLAN.md for instructions."
            exit 1
          fi
          echo "All required secrets are present."

  build-and-upload:
    name: Archive, sign, and upload to TestFlight
    runs-on: macos-15
    needs: preflight
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/WhatsNext
        run: xcodegen generate

      # ── Signing setup ────────────────────────────────────────────────────────

      - name: Install signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.SIGNING_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_PATH"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH/WhatsNextApp.mobileprovision"

      # ── App icon ─────────────────────────────────────────────────────────────

      - name: Generate app icons
        working-directory: ios/WhatsNext
        run: |
          if [ -f "../../scripts/generate_app_icons.sh" ]; then
            bash ../../scripts/generate_app_icons.sh
          else
            echo "Icon generation script not found — skipping (existing icons will be used)."
          fi

      # ── Archive ──────────────────────────────────────────────────────────────

      - name: Archive
        working-directory: ios/WhatsNext
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
        run: |
          xcodebuild archive \
            -project WhatsNext.xcodeproj \
            -scheme WhatsNextApp \
            -configuration Release \
            -archivePath $RUNNER_TEMP/WhatsNext.xcarchive \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=YES \
            | xcpretty

      # ── Export IPA ───────────────────────────────────────────────────────────

      - name: Write export options plist
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>WhatsNextApp</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/WhatsNext.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            | xcpretty

      # ── Upload to App Store Connect ───────────────────────────────────────────

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Upload to TestFlight via altool
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/오늘하나.ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

      - name: Upload IPA as artifact (fallback reference)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WhatsNext-ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 14
