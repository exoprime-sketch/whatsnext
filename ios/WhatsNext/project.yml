name: WhatsNext
options:
  minimumXcodeGenVersion: 2.45.4
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  developmentLanguage: ko
configs:
  Debug: debug
  Release: release
settingGroups:
  sharedReleaseConfig:
    DEVELOPMENT_TEAM: YOUR_TEAM_ID
    WHATSNEXT_APP_BUNDLE_IDENTIFIER: com.todayone.whatsnext
    WHATSNEXT_WIDGET_BUNDLE_IDENTIFIER: com.todayone.whatsnext.widget
    WHATSNEXT_APP_GROUP_IDENTIFIER: group.com.todayone.whatsnext
    WHATSNEXT_SUPPORT_EMAIL: support@example.com
    WHATSNEXT_PRIVACY_POLICY_URL: https://example.com/privacy
    WHATSNEXT_OPERATOR_NAME: YOUR_COMPANY_NAME
targets:
  WhatsNextApp:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: App/Sources
    resources:
      - path: App/Resources
    info:
      path: App/Info.plist
    entitlements:
      path: App/WhatsNext.entitlements
    settings:
      groups:
        - sharedReleaseConfig
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(WHATSNEXT_APP_BUNDLE_IDENTIFIER)
        PRODUCT_NAME: 오늘하나
        SWIFT_VERSION: 5.9
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: App/WhatsNext.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: WhatsNextWidgetExtension
        embed: true
        codeSign: false
        copy:
          destination: plugins
  WhatsNextWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Shared
      - path: Widget/Sources
    resources:
      - path: Widget/Resources
      - path: App/Resources
    info:
      path: Widget/Info.plist
    entitlements:
      path: Widget/WhatsNextWidget.entitlements
    settings:
      groups:
        - sharedReleaseConfig
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(WHATSNEXT_WIDGET_BUNDLE_IDENTIFIER)
        PRODUCT_NAME: 오늘하나 위젯
        SWIFT_VERSION: 5.9
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        APPLICATION_EXTENSION_API_ONLY: YES
        CODE_SIGN_ENTITLEMENTS: Widget/WhatsNextWidget.entitlements
schemes:
  WhatsNextApp:
    build:
      targets:
        WhatsNextApp: all
        WhatsNextWidgetExtension: all
    run:
      config: Debug
      executable: WhatsNextApp
    archive:
      config: Release
    management:
      shared: true
      orderHint: 1
  WhatsNextWidgetExtension:
    build:
      targets:
        WhatsNextWidgetExtension: all
    run:
      config: Debug
      executable: WhatsNextApp
      askForAppToLaunch: true
      launchAutomaticallySubstyle: "2"
    archive:
      config: Release
    management:
      shared: true
      orderHint: 2
